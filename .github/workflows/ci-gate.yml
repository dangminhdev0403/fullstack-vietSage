name: CI Gate

on:
  pull_request:
    paths:
      - "services/auth-service/**"
      - "frontends/front-end-vietsage/**"
      - "shared/api-contract/**"
      - "docker-compose*.yml"
      - "docker-compose*.yaml"
      - ".github/workflows/ci-gate.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "services/auth-service/**"
      - "frontends/front-end-vietsage/**"
      - "shared/api-contract/**"
      - "docker-compose*.yml"
      - "docker-compose*.yaml"
      - ".github/workflows/ci-gate.yml"

jobs:
  auth-service:
    name: Backend auth-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    env:
      NODE_ENV: test
      PORT: "8080"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vietsage_auth
      MIGRATION_DATABASE_URL: ${{ secrets.AUTH_SERVICE_DATABASE_URL }}
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      AUTHZ_ROUTE_SYNC_ENABLED: "false"
      AUTHZ_ENFORCEMENT_ENABLED: "false"
      AUTHZ_STRICT_MODE: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Prisma migration status
        if: ${{ env.MIGRATION_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ env.MIGRATION_DATABASE_URL }}
        run: npm run prisma:status

      - name: Lint
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --runInBand

      - name: E2E test
        run: npm run test:e2e -- --runInBand

  frontend:
    name: Frontend front-end-vietsage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontends/front-end-vietsage
    env:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-nextauth-secret
      AUTH_TRUST_HOST: "true"
      AUTH_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_AUTH_API_BASE_URL: http://localhost:8080
      NEXT_PUBLIC_GUEST_DEFAULT_SERVICE_CATEGORY_ID: svc_cat_housekeeping
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontends/front-end-vietsage/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

  api-contract:
    name: Shared API contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared/api-contract
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify contract
        run: npm run verify

  compose:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI compose env files
        run: bash scripts/init-secrets.sh

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate docker-compose.prod.yml
        run: docker compose -f docker-compose.prod.yml config --quiet
