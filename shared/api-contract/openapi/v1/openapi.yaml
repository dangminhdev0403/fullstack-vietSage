                      - description
                      - status
                      - createdAt
                      - updatedAt
                      - rolePermissions
                      - _count
                required:
                  - status
                  - error
                  - message
                  - data
      tags: *a2
    patch:
      operationId: RolesController_updateRole
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 120
                description:
                  type: string
                  maxLength: 255
      responses:
        "200":
          description: Bao phản hồi cập nhật vai trò
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 200
                  error:
                    type: object
                    nullable: true
                    additionalProperties: true
                    example: null
                  message:
                    type: string
                    example: Cập nhật vai trò thành công
                  data:
                    type: object
                    properties:
                      id:
