openapi: 3.0.0
paths:
  /health:
    get:
      operationId: HealthController_getHealth
      parameters: []
      responses:
        "200":
          description: Bao phản hồi kiểm tra hệ thống
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 200
                  error:
                    type: object
                    nullable: true
                    additionalProperties: true
                    example: null
                  message:
                    type: string
                    example: Kiểm tra hệ thống thành công
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum:
                          - ok
                      service:
                        type: string
                        example: auth-service
                      uptimeSeconds:
                        type: number
                        example: 1234
                      timestamp:
                        type: string
                        format: date-time
                    required:
                      - status
                      - service
                      - uptimeSeconds
                      - timestamp
                required:
                  - status
                  - error
                  - message
                  - data
      tags:
        - health
  /auth/login:
    post:
      operationId: AuthController_login
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 1
              required:
                - email
                - password
      responses:
        "200":
          description: Bao phản hồi đăng nhập
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 200
                  error:
                    type: object
                    nullable: true
                    additionalProperties: true
                    example: null
                  message:
                    type: string
                    example: Đăng nhập thành công
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
                      tokenType:
                        type: string
                        enum:
                          - Bearer
                      accessTtl:
                        type: string
                        example: 15m
                      refreshTtl:
                        type: string
                        example: 7d
                      accessExpiresAt:
                        type: string
                        format: date-time
                      refreshExpiresAt:
                        type: string
                        format: date-time
                      sessionId:
                        type: string
                        format: uuid
                    required:
                      - accessToken
                      - refreshToken
                      - tokenType
                      - accessTtl
                      - refreshTtl
                      - accessExpiresAt
                      - refreshExpiresAt
                      - sessionId
                required:
                  - status
                  - error
                  - message
                  - data
      tags: &a1
        - auth
  /auth/refresh:
    post:
      operationId: AuthController_refresh
      parameters:
        - name: idempotency-key
          required: true
          in: header
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          description: Stable key for retrying the same refresh request (maximum 64
            characters)
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  minLength: 1
              required:
                - refreshToken
      responses:
        "201":
          description: Bao phản hồi làm mới token
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 201
                  error:
                    type: object
                    nullable: true
                    additionalProperties: true
                    example: null
                  message:
                    type: string
                    example: Làm mới token thành công
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
                      tokenType:
                        type: string
                        enum:
                          - Bearer
                      accessTtl:
                        type: string
                        example: 15m
                      refreshTtl:
                        type: string
                        example: 7d
                      accessExpiresAt:
                        type: string
                        format: date-time
                      refreshExpiresAt:
                        type: string
                        format: date-time
                      sessionId:
                        type: string
                        format: uuid
                    required:
                      - accessToken
                      - refreshToken
                      - tokenType
                      - accessTtl
                      - refreshTtl
                      - accessExpiresAt
                      - refreshExpiresAt
                      - sessionId
                required:
                  - status
                  - error
                  - message
                  - data
      tags: *a1
  /auth/logout:
    post:
      operationId: AuthController_logout
      parameters: []
      responses:
        "200":
          description: Bao phản hồi đăng xuất
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 200
                  error:
                    type: object
                    nullable: true
                    additionalProperties: true
                    example: null
                  message:
                    type: string
                    example: Đăng xuất thành công
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                        enum:
                          - true
                    required:
                      - success
                required:
                  - status
                  - error
                  - message
                  - data
      tags: *a1
  /auth/logout-all:
    post:
      operationId: AuthController_logoutAll
      parameters: []
      responses:
        "200":
          description: Bao phản hồi đăng xuất tất cả phiên
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 200
                  error:
                    type: object
                    nullable: true
                    additionalProperties: true
                    example: null
                  message:
                    type: string
                    example: Đăng xuất tất cả thiết bị thành công
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                        enum:
                          - true
                    required:
                      - success
                required:
                  - status
                  - error
                  - message
                  - data
      tags: *a1
  /auth/me:
    get:
      operationId: AuthController_me
      parameters: []
      responses:
        "200":
          description: Bao phản hồi hồ sơ
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 200
                  error:
                    type: object
                    nullable: true
                    additionalProperties: true
                    example: null
                  message:
                    type: string
                    example: Lấy hồ sơ thành công
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                        format: email
                      fullName:
                        type: string
                      status:
                        type: string
                        enum:
                          - ACTIVE
                          - LOCKED
                          - DISABLED
                      roles:
                        type: array
                        items:
                          type: string
                      activeRole:
                        type: object
                        description: The active role bound to the current authenticated session.
                        properties:
                          id:
                            type: string
                          code:
                            type: string
                          name:
                            type: string
                        required:
                          - id
                          - code
                          - name
                      menus:
                        type: array
                        items:
                          type: string
                      permissions:
                        type: array
                        items:
                          type: string
                      tenants:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            code:
                              type: string
                            name:
                              type: string
                            status:
                              type: string
                          required:
                            - id
                            - code
                            - name
                            - status
                      accessibleHotels:
                        type: array
                        description: Active hotel assignments within active tenant memberships. The
                          client must explicitly choose an active hotel context.
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            tenantId:
                              type: string
                            code:
                              type: string
                            name:
                              type: string
                          required:
                            - id
                            - tenantId
                            - code
                            - name
                    required:
                      - id
                      - email
                      - fullName
                      - status
                      - roles
                      - activeRole
                      - menus
                      - permissions
                      - tenants
                      - accessibleHotels
                required:
                  - status
                  - error
                  - message
                  - data
      tags: *a1
  /roles:
    post:
      operationId: RolesController_createRole
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  minLength: 2
                  maxLength: 80
                name:
                  type: string
                  minLength: 2
                  maxLength: 120
                description:
                  type: string
                  maxLength: 255
              required:
                - code
                - name
      responses:
        "201":
          description: Bao phản hồi tạo vai trò
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 201
                  error:
                    type: object
                    nullable: true
                    additionalProperties: true
                    example: null
                  message:
                    type: string
                    example: Tạo vai trò thành công
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      code:
                        type: string
                      name:
                        type: string
                      description:
                        type: string
                        nullable: true
                      status:
                        type: string
                        enum:
                          - ACTIVE
                          - DISABLED
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
                    required:
                      - id
                      - code
                      - name
                      - description
                      - status
                      - createdAt
                      - updatedAt
                required:
                  - status
                  - error
                  - message
                  - data
      tags: &a2
        - rbac.roles
    get:
      operationId: RolesController_listRoles
      parameters: []
      responses:
        "200":
          description: Bao phản hồi danh sách vai trò
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 200
                  error:
                    type: object
                    nullable: true
                    additionalProperties: true
                    example: null
                  message:
                    type: string
                    example: Lấy danh sách vai trò thành công
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        description:
                          type: string
                          nullable: true
                        createdAt:
                          type: string
                          format: date-time
                        name:
                          type: string
                        status:
                          type: string
                          enum:
                            - ACTIVE
                            - DISABLED
                        menus:
                          type: array
                          items:
                            type: string
                        enabledCount:
                          type: number
                      required:
                        - id
                        - description
                        - createdAt
                        - name
                        - status
                        - menus
                        - enabledCount
                required:
                  - status
                  - error
                  - message
                  - data
      tags: *a2
  /roles/by-name/{name}:
    get:
      operationId: RolesController_getRoleByName
      parameters:
        - name: name
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
