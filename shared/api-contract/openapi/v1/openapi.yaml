            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 200
                  error:
                    type: object
                    nullable: true
                    additionalProperties: true
                    example: null
                  message:
                    type: string
                    example: Lấy chi tiết vai trò thành công
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      code:
                        type: string
                      name:
                        type: string
                      description:
                        type: string
                        nullable: true
                      status:
                        type: string
                        enum:
                          - ACTIVE
                          - DISABLED
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
                      rolePermissions:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            roleId:
                              type: string
                            permissionId:
                              type: string
                            permission:
                              type: object
                              properties:
                                id:
                                  type: string
                                method:
                                  type: string
                                  enum:
                                    - GET
                                    - POST
                                    - PUT
                                    - PATCH
                                    - DELETE
                                    - OPTIONS
                                path:
                                  type: string
                                description:
                                  type: string
                                createdAt:
                                  type: string
                                  format: date-time
                                updatedAt:
                                  type: string
                                  format: date-time
                              required:
                                - id
                                - method
                                - path
                                - description
                                - createdAt
                                - updatedAt
                          required:
                            - id
                            - roleId
                            - permissionId
                            - permission
                      _count:
                        type: object
                        properties:
                          userRoles:
                            type: number
                          rolePermissions:
                            type: number
                        required:
                          - userRoles
                          - rolePermissions
                    required:
                      - id
                      - code
                      - name
                      - description
                      - status
                      - createdAt
                      - updatedAt
                      - rolePermissions
                      - _count
                required:
                  - status
                  - error
                  - message
                  - data
      tags: *a2
  /roles/menus:
    get:
      operationId: RolesController_getRoleMenus
      parameters: []
      responses:
        "200":
          description: Bao phản hồi danh sách menu của vai trò
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    example: 200
                  error:
                    type: object
                    nullable: true
                    additionalProperties: true
                    example: null
                  message:
                    type: string
                    example: Lấy menu của vai trò thành công
                  data:
                    type: array
                    items:
                      type: string
                required:
                  - status
                  - error
                  - message
                  - data
      tags: *a2
  /roles/{id}:
    get:
      operationId: RolesController_getRole
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Bao phản hồi lấy vai trò
          content:
            application/json:
              schema:
                type: object
                properties:
