                                    - POST
                                    - PUT
                                    - PATCH
                                    - DELETE
                                    - OPTIONS
                                path:
                                  type: string
                                description:
                                  type: string
                                createdAt:
                                  type: string
                                  format: date-time
                                updatedAt:
                                  type: string
                                  format: date-time
                              required:
                                - id
                                - method
                                - path
                                - description
                                - createdAt
                                - updatedAt
                          required:
                            - id
                            - roleId
                            - permissionId
                            - permission
                      _count:
                        type: object
                        properties:
