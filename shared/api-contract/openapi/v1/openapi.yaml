                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      code:
                        type: string
                      name:
                        type: string
                      description:
                        type: string
                        nullable: true
                      status:
                        type: string
                        enum:
                          - ACTIVE
                          - DISABLED
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
                      rolePermissions:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            roleId:
                              type: string
                            permissionId:
                              type: string
                            permission:
                              type: object
                              properties:
                                id:
