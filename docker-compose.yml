services:
  postgres:
    image: postgres:16-alpine
    container_name: vietsage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vietsage_auth}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - vietsage_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-vietsage_auth}"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: vietsage-auth-service
    restart: unless-stopped
    env_file:
      - ./services/auth-service/.env.docker
    environment:
      NODE_ENV: production
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontends/font-end-vietsage
      dockerfile: Dockerfile
    container_name: vietsage-frontend
    restart: unless-stopped
    env_file:
      - ./frontends/font-end-vietsage/.env.docker
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: replace-with-local-docker-nextauth-secret
      AUTH_API_BASE_URL: http://auth-service:8080
      NEXT_PUBLIC_AUTH_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - auth-service

volumes:
  vietsage_postgres_data:
