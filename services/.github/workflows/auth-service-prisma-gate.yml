name: Auth Service Prisma Gate

on:
  pull_request:
    paths:
      - "auth-service/**"
      - ".github/workflows/auth-service-prisma-gate.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "auth-service/**"
      - ".github/workflows/auth-service-prisma-gate.yml"

jobs:
  prisma-check:
    name: Prisma migration gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-service
    env:
      DATABASE_URL: ${{ secrets.AUTH_SERVICE_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma check
        run: npm run prisma:check
