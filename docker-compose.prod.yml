services:
  postgres:
    image: postgres:16-alpine
    container_name: vietsage-postgres
    restart: unless-stopped
    env_file:
      - ./secrets/production/postgres.env
    volumes:
      - vietsage_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-vietsage_auth}"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth-service:
    image: vietsage-auth-service:prod
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: vietsage-auth-service
    restart: unless-stopped
    env_file:
      - ./secrets/production/auth-service.env
    environment:
      NODE_ENV: production
      PORT: "8080"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:${AUTH_SERVICE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    image: vietsage-frontend:prod
    build:
      context: ./frontends/font-end-vietsage
      dockerfile: Dockerfile
    container_name: vietsage-frontend
    restart: unless-stopped
    env_file:
      - ./secrets/production/frontend.env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      AUTH_API_BASE_URL: http://auth-service:8080
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/icon.png').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  vietsage_postgres_data:
