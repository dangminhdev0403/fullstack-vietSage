services:
  postgres:
    image: postgres:16-alpine
    ports:
    - "5433:5432"
    container_name: vietsage-postgres
    restart: unless-stopped
    mem_limit: 512m
    cpus: "1.0"
    pids_limit: 128
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    env_file:
      - ./secrets/production/postgres.env
    volumes:
      - vietsage_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-vietsage_auth}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - backend

  migrate:
    image: "${AUTH_SERVICE_IMAGE:-vietsage-auth-service:prod}"
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: vietsage-migrate
    restart: "no"
    mem_limit: 512m
    cpus: "1.0"
    pids_limit: 128
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    env_file:
      - ./secrets/production/auth-service.env
    environment:
      NODE_ENV: production
    command: ["node_modules/.bin/prisma", "migrate", "deploy"]
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  auth-service:
    image: "${AUTH_SERVICE_IMAGE:-vietsage-auth-service:prod}"
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: vietsage-auth-service
    restart: unless-stopped
    mem_limit: 512m
    cpus: "1.5"
    pids_limit: 128
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    env_file:
      - ./secrets/production/auth-service.env
    environment:
      NODE_ENV: production
      PORT: "8080"
    volumes:
      - "./secrets/production/google-service-account.json:/run/secrets/google-service-account.json:ro"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - edge
      - backend

  frontend:
    image: "${FRONTEND_IMAGE:-vietsage-frontend:prod}"
    build:
      context: ./frontends/front-end-vietsage
      dockerfile: Dockerfile
    container_name: vietsage-frontend
    restart: unless-stopped
    mem_limit: 384m
    cpus: "1.0"
    pids_limit: 128
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    env_file:
      - ./secrets/production/frontend.env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      AUTH_API_BASE_URL: http://auth-service:8080
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/icon.png').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - edge

  nginx:
    image: nginxinc/nginx-unprivileged:1.28-alpine
    container_name: vietsage-nginx
    restart: unless-stopped
    mem_limit: 128m
    cpus: "0.5"
    pids_limit: 64
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "${NGINX_HTTP_PORT:-80}:8080"
      - "${NGINX_HTTPS_PORT:-443}:8443"
    volumes:
      - "./deploy/nginx/${NGINX_CONFIG_FILE:-docker-vietsage.conf}:/etc/nginx/conf.d/default.conf:ro"
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      auth-service:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/nginx-health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - edge

  certbot:
    image: certbot/certbot:v5.1.0
    restart: "no"
    mem_limit: 256m
    cpus: "0.5"
    pids_limit: 64
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    read_only: true
    tmpfs:
      - /tmp
      - /var/lib/letsencrypt
      - /var/log/letsencrypt
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles:
      - tls-tools
    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - edge

volumes:
  vietsage_postgres_data:
  certbot_webroot:
  letsencrypt:

networks:
  edge:
  backend:
    internal: true
